name: Dotfiles CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository for credentials
        shell: bash
        run: |
          set -euo pipefail
          printf '^/repo/\\.git(/|$)\\n' > "$RUNNER_TEMP/trufflehog-exclude.txt"
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo:ro" \
            -v "$RUNNER_TEMP/trufflehog-exclude.txt:/exclude.txt:ro" \
            ghcr.io/trufflesecurity/trufflehog:3.95.3 \
            filesystem --no-update --exclude-paths=/exclude.txt --results=verified,unknown,unverified --fail /repo

  dotfiles:
    name: Dotfiles checks
    runs-on: ubuntu-latest
    env:
      CHEZMOI_CI_DATA: '{"opencode_remote_url":"http://localhost:42800"}'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore tool cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/chezmoi
            ~/.npm
            ~/.npm-global
          key: dotfiles-tools-v2-${{ runner.os }}-chezmoi-2.70.0-typescript-latest

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck jq nodejs npm
          mkdir -p "$HOME/.local/bin" "$HOME/.npm-global"
          npm config set prefix "$HOME/.npm-global"
          export PATH="$HOME/.local/bin:$HOME/.npm-global/bin:$PATH"
          if ! command -v chezmoi >/dev/null 2>&1; then
            sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin" "v2.70.0"
          fi
          if ! command -v tsc >/dev/null 2>&1; then
            npm install -g typescript
          fi
          {
            echo "$HOME/.local/bin"
            echo "$HOME/.npm-global/bin"
          } >> "$GITHUB_PATH"

      - name: Validate chezmoi source
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/home"
          mkdir -p "$HOME"
          chezmoi --source "$GITHUB_WORKSPACE" --destination "$HOME" --override-data "$CHEZMOI_CI_DATA" apply --dry-run

      - name: Validate JSON files and rendered JSON templates
        shell: bash
        env:
          GITHUB_TOKEN: dummy-token-for-template-render
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path('.').rglob('*.json')):
              if '.git' in path.parts:
                  continue
              json.loads(path.read_text())
              print(f'json ok: {path}')
          PY

          while IFS= read -r -d '' template; do
            rendered="$(mktemp)"
            chezmoi --override-data "$CHEZMOI_CI_DATA" execute-template < "$template" > "$rendered"
            python3 - "$rendered" <<'PY'
          import json
          import sys
          json.loads(open(sys.argv[1], encoding='utf-8').read())
          PY
            echo "json template ok: $template"
          done < <(python3 - <<'PY'
          from pathlib import Path
          import sys
          for path in sorted(Path('.').rglob('*.json.tmpl')):
              if '.git' not in path.parts:
                  sys.stdout.buffer.write(str(path).encode() + b'\\0')
          PY
          )

      - name: Shell syntax
        shell: bash
        run: |
          set -euo pipefail
          bash -n run_once_before_10-apply-dconf-settings.sh
          bash -n scripts/install-system-deps.sh
          bash -n dot_claude/hooks/executable_*.sh

      - name: Shellcheck maintained scripts
        shell: bash
        run: |
          set -euo pipefail
          shellcheck run_once_before_10-apply-dconf-settings.sh scripts/install-system-deps.sh dot_claude/hooks/executable_*.sh

      - name: JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(python3 - <<'PY'
          from pathlib import Path
          import sys
          for path in sorted(Path('.').rglob('*.js')):
              if '.git' not in path.parts:
                  sys.stdout.buffer.write(str(path).encode() + b'\\0')
          PY
          )

      - name: Standalone TypeScript typecheck
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "dot_omp/private_agent/extensions/*.ts" > /dev/null; then
            tsc --noEmit --skipLibCheck --target ES2022 --moduleResolution bundler --module ESNext dot_omp/private_agent/extensions/*.ts
          fi
