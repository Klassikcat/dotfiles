# Commands and Apps to be executed at launch

$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

$wallDIR=$HOME/Pictures/wallpapers
$lock = $scriptsDir/LockScreen.sh
$SwwwRandom = $UserScripts/WallpaperAutoChange.sh
$livewallpaper="$HOME/Videos/LiveWallpaper/yuuka-eating-blue-archive-moewalls-com.mp4"

# wallpaper stuff 
exec-once = swww-daemon --format xrgb

# wallpaper random
#exec-once = $SwwwRandom $wallDIR # random wallpaper switcher every 30 minutes

# Startup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE XDG_SESSION_TYPE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE XDG_SESSION_TYPE
# Fix env-timing issues: after env import, start heliocron-based theme services under Hyprland session
# NOTE: systemd user units for hyprland-theme@sunrise-light/sunset-dark are disabled; Hyprland owns their lifecycle.
exec-once = systemctl --user start hyprland-theme@sunrise-light.service hyprland-theme@sunset-dark.service

# Initialize Drop Down terminal - See Bug#810 https://github.com/JaKooLit/Hyprland-Dots/issues/810#issuecomment-3351947644
exec-once = $HOME/.config/hypr/scripts/Dropterminal.sh kitty &


# Polkit (Polkit Gnome / KDE)
exec-once = $scriptsDir/Polkit.sh

# starup apps
exec-once = nm-applet --indicator
#exec-once = swaync
exec-once = ags
exec-once = blueman-applet
#exec-once = rog-control-center
exec-once = $scriptsDir/WaybarStart.sh
exec-once = qs # quickshell AGS Desktop Overview alternative

#clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Input Method (fcitx5 for Korean/Hangul)
exec-once = fcitx5 -d

# Rainbow borders
#exec-once = $UserScripts/RainbowBorders.sh

# Starting hypridle to start hyprlock
exec-once = hypridle

# Hyprland theme service
# Restore Theme on Startup (calculates based on sun position)
exec-once = $HOME/.local/bin/hyprland-theme-init.sh

# Display brightness based on time (midnight: 30%, sunrise: 100%)
exec-once = $HOME/.local/bin/brightness-init.sh

# Here are list of features available but disabled by default
# exec-once = swww-daemon --format xrgb && swww img $HOME/Pictures/wallpapers/mecha-nostalgia.png  # persistent wallpaper

#gnome polkit for nixos
#exec-once = $scriptsDir/Polkit-NixOS.sh

# xdg-desktop-portal-hyprland (should be auto starting. However, you can force to start)
#exec-once = $scriptsDir/PortalHyprland.sh
