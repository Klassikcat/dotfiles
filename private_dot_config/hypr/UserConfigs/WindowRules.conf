# User window/layer rules entrypoint
source = $HOME/.config/hypr/configs/WindowRules.conf

# Zed editor opacity (active inactive)
windowrule = match:class ^(dev.zed.Zed)$, opacity 0.9 0.8

# Skip blur behind fullscreen windows: fullscreen_opacity=1.0 makes them opaque so blur is invisible anyway, but still computed. Saves GPU (esp. video on the 4K).
windowrule = match:fullscreen 1, no_blur on